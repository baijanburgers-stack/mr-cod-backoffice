runtime: nodejs20

env:
  - variable: NEXT_PUBLIC_VAPID_KEY
    secret: NEXT_PUBLIC_VAPID_KEY
    availability:
      - BUILD
      - RUNTIME

  - variable: FIREBASE_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL
    availability:
      - RUNTIME

  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
    availability:
      - RUNTIME

  - variable: FIREBASE_PROJECT_ID
    secret: FIREBASE_PROJECT_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_BASE_URL
    value: "https://mr-cod-backoffice--mr-cod-online-ordering.europe-west4.hosted.app"
    availability:
      - BUILD
      - RUNTIME